<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gozzy Scholar - Learn. Grow. Excel.</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#2563EB', primaryHover: '#1D4ED8', primaryLight: '#EFF6FF', bgLight: '#F3F4F6', accentGreen: '#22C55E', accentRed: '#EF4444', accentOrange: '#F97316', darkBg: '#111827', darkCard: '#1F2937' } } }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background-color: #CBD5E1; border-radius: 10px; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .hide-view { display: none !important; }
    </style>
</head>
<body class="bg-bgLight text-gray-800 dark:bg-darkBg transition-colors duration-300 antialiased overflow-x-hidden font-sans">

    <!-- [Keep your existing Header and Sidebar HTML here...] -->
    <!-- (Note: Ensure your HTML remains identical to what you sent for the structure) -->

    <!-- ================= VIEW 4: STUDY MODES PANEL (With Lock Logic) ================= -->
    <section id="view-modes" class="flex-1 flex flex-col fade-in hide-view bg-white dark:bg-darkCard">
        <!-- Tabs Navigation -->
        <div class="flex border-b border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50">
            <button onclick="switchStudyTab('practice')" id="tab-btn-practice" class="flex-1 py-4 text-center font-semibold text-primary border-b-2 border-primary">Practice</button>
            <button onclick="switchStudyTab('boost')" id="tab-btn-boost" class="flex-1 py-4 text-center font-medium text-gray-500">Boost</button>
            <button onclick="switchStudyTab('mock')" id="tab-btn-mock" class="flex-1 py-4 text-center font-medium text-gray-500">Mock</button>
        </div>

        <div class="p-4 sm:p-8 flex-1">
            <!-- Mock Exam View -->
            <div id="tab-mock" class="max-w-2xl mx-auto space-y-6 fade-in hide-view">
                <!-- ... content ... -->
                <button id="btn-mock-exam" disabled class="w-full bg-gray-400 text-white font-bold py-4 rounded-xl shadow-lg transition text-lg mt-4 cursor-not-allowed opacity-50">
                    Initialize Mock Exam (Login Required)
                </button>
            </div>
        </div>
    </section>

    <script>
        // --- Firebase Initialization ---
        const firebaseConfig = {
            apiKey: "AIzaSyAS-K_2PXcUl2zDgsmiQq7Mq_a7B1J-m3s",
            authDomain: "gozzy-scholar.firebaseapp.com",
            projectId: "gozzy-scholar",
            storageBucket: "gozzy-scholar.firebasestorage.app",
            messagingSenderId: "5572719519",
            appId: "1:5572719519:web:8f30447f8c3d003b05c3aa"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // --- Firebase Auth Logic ---
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = e.target[0].value;
            const pass = e.target[1].value;
            try {
                await auth.signInWithEmailAndPassword(email, pass);
                alert("Welcome back!");
                navigate('dashboard');
            } catch (err) { alert(err.message); }
        });

        document.getElementById('form-signup').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = e.target[0].value;
            const pass = e.target[1].value;
            try {
                await auth.createUserWithEmailAndPassword(email, pass);
                alert("Account created successfully!");
                navigate('dashboard');
            } catch (err) { alert(err.message); }
        });

        // --- Auth State Listener (The "Lock" Mechanism) ---
        auth.onAuthStateChanged((user) => {
            const btn = document.getElementById('btn-mock-exam');
            if (user) {
                // User is signed in: Unlock the button
                btn.disabled = false;
                btn.classList.remove('bg-gray-400', 'cursor-not-allowed', 'opacity-50');
                btn.classList.add('bg-gray-800', 'hover:bg-gray-900');
                btn.innerText = "Initialize Mock Exam";
            } else {
                // User is signed out: Keep locked
                btn.disabled = true;
                btn.classList.add('bg-gray-400', 'cursor-not-allowed', 'opacity-50');
                btn.classList.remove('bg-gray-800', 'hover:bg-gray-900');
                btn.innerText = "Initialize Mock Exam (Login Required)";
            }
        });

        // [Include your existing navigation/toggle functions here...]
    </script>
</body>
</html>
